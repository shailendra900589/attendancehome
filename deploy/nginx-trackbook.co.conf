# Nginx — www.trackbook.co marketing site
#
# IMPORTANT: Pehle check karo cert ka naam:
#   sudo ls /etc/letsencrypt/live/
# Agar folder "trackbook.co" hai (common), neeche wale paths sahi hain.
# Agar alag hai, ssl_certificate lines update karo.
#
# Agar pehle se /etc/nginx/sites-enabled/trackbook.co.conf chal raha hai,
# naya file mat copy karo — sirf usme root change karo:
#   root /var/www/attendance;

server {
    listen 80;
    listen [::]:80;
    server_name trackbook.co www.trackbook.co;
    return 301 https://www.trackbook.co$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trackbook.co;
    return 301 https://www.trackbook.co$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.trackbook.co;

    root /var/www/attendance;
    index index.php index.html;

    # Cert path — usually trackbook.co (NOT www.trackbook.co)
    ssl_certificate     /etc/letsencrypt/live/trackbook.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trackbook.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/trackbook.co.access.log;
    error_log  /var/log/nginx/trackbook.co.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\.(git|env) {
        deny all;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
