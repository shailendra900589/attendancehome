# Nginx site config for www.trackbook.co
# Copy: sudo cp deploy/nginx-trackbook.co.conf /etc/nginx/sites-available/trackbook.co
# Enable: sudo ln -sf /etc/nginx/sites-available/trackbook.co /etc/nginx/sites-enabled/
# Test:   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name trackbook.co www.trackbook.co;
    return 301 https://www.trackbook.co$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trackbook.co;
    return 301 https://www.trackbook.co$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.trackbook.co;

    root /var/www/attendance;
    index index.php index.html;

    # SSL paths — update to your certbot/Let's Encrypt paths
    ssl_certificate     /etc/letsencrypt/live/www.trackbook.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.trackbook.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/trackbook.co.access.log;
    error_log  /var/log/nginx/trackbook.co.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\.(git|env) {
        deny all;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
